    <script id="encrypted-iv" type="text/plain">q9UY52z/dcghSz6n</script>

    <div id="letters-container"></div>

    <script>
      (function() {
        if (window.crypto && window.crypto.subtle) {
          window.__forgeReady = Promise.resolve();
          return;
        }
        window.__forgeReady = new Promise(function(resolve, reject) {
          var s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/forge/1.0.0/forge.min.js';
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
      })();
    </script>
    <script src="/assets/js/auth.js"></script>
    <script>
      (function () {
        'use strict';

        var KEY = 'letters_key';
        var TS = 'letters_ts';
        var TTL_MS = 15000;

        var loading = document.getElementById('loading');
        var container = document.getElementById('letters-container');

        // 1. Read sessionStorage
        var hexKey = sessionStorage.getItem(KEY);
        var ts = sessionStorage.getItem(TS);

        // 2. Validate TTL
        if (!hexKey || !ts || (Date.now() - parseInt(ts, 10)) > TTL_MS) {
          sessionStorage.removeItem(KEY);
          sessionStorage.removeItem(TS);
          location.replace('/');
          return;
        }

        // 3. Clear sessionStorage immediately (single-use)
        sessionStorage.removeItem(KEY);
        sessionStorage.removeItem(TS);

        // 4. Read encrypted blobs
        var ciphertext = document.getElementById('encrypted-content').textContent.trim();
        var iv = document.getElementById('encrypted-iv').textContent.trim();

        if (ciphertext === 'PLACEHOLDER_CIPHERTEXT' || iv === 'PLACEHOLDER_IV') {
          loading.innerHTML = '<p style="color:#2C2A20">Content not yet encrypted. Run encrypt.mjs first.</p>';
          return;
        }

        // 5. Decrypt and render
        LettersAuth.decryptWithKey(hexKey, ciphertext, iv)
          .then(function (html) {
            loading.style.display = 'none';
            container.innerHTML = html;
          })
          .catch(function () {
            loading.innerHTML = '<p style="color:#2C2A20">Decryption failed.</p>';
            setTimeout(function () { location.replace('/'); }, 2000);
          });
      })();
    </script>
