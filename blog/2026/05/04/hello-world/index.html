<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#64B5F6">
    <title>zetazero's blog</title>
    <link rel="stylesheet" href="/assets/css/style.css?v=13">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>z</text></svg>">
  </head>
  <body>
    <header>
      <nav>
        <div id="nav">
          <h1><a href="/" title="Homepage">zetazero</a></h1>
          <div class="nav-controls">
            <a href="/about" data-en="About" data-zh="关于">About</a>
            <a href="https://github.com/Ha1baraA11">GitHub</a>
          </div>
        </div>
        <div id="reading-progress" aria-hidden="true"></div>
      </nav>
      <h1>Hello World</h1>
      <div class="post-meta">
        <span class="view-count" id="view-count"></span>
        <span>·</span>
        <span>1 min read.</span>
      </div>
    </header>

    <main>
      <article>
        <p>This is my first post on zetazero.top. Built with HTML &amp; CSS and hosted on GitHub Pages.</p>

        <p>More coming soon.</p>

        <p>Published <time datetime="2026-05-04">04 May 2026</time></p>
      </article>
    </main>

    <footer>
      <p data-en="Built with HTML, CSS, and a text editor. No frameworks, no build tools, no nonsense." data-zh="用 HTML、CSS 和一个文本编辑器搭建。没有框架，没有构建工具，没有废话。">Built with HTML, CSS, and a text editor. No frameworks, no build tools, no nonsense.</p>
    </footer>

    <script>
      // GoatCounter page tracking
      if (!window.goatcounter) window.goatcounter = {};
      window.goatcounter.allow_local = true;
    </script>
    <script data-goatcounter="https://zetazero.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    <script>
      // GoatCounter view count display
      (function() {
        var SITE_CODE = 'zetazero';
        var API_KEY = '1qdcznjzflwb61y9zaddcfaclzcsa3gbpzjt6i146s39lk0tliz';
        var counterEl = document.getElementById('view-count');
        if (!counterEl || !API_KEY) return;

        function formatCount(n) {
          if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
          if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'k';
          return String(n);
        }

        var lang = localStorage.getItem('lang') || 'en';
        var label = lang === 'zh' ? ' 次阅读' : ' views';
        var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        // Show loading placeholder immediately
        counterEl.innerHTML = '<span class="num">—</span>' + label;
        counterEl.classList.add('view-count-loading');

        var auth = btoa(':' + API_KEY);
        var base = 'https://' + SITE_CODE + '.goatcounter.com/api/v0';
        var path = location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '') || '/';

        fetch(base + '/stats/hits?path_by_name=true&include_paths=' + encodeURIComponent(path), {
          headers: { 'Authorization': 'Basic ' + auth }
        })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            var total = 0;
            if (data.hits) {
              data.hits.forEach(function(h) { total += h.count || 0; });
            }
            counterEl.dataset.count = formatCount(total);
            counterEl.classList.remove('view-count-loading');

            if (reducedMotion || total < 2) {
              counterEl.innerHTML = '<span class="num">' + formatCount(total) + '</span>' + label;
              counterEl.classList.add('view-count-final');
            } else {
              // Count up animation
              var steps = 20;
              var stepTime = 40;
              var current = 0;
              var stepVal = total / steps;
              var numEl = counterEl.querySelector('.num');

              var timer = setInterval(function() {
                current += stepVal;
                if (current >= total) {
                  clearInterval(timer);
                  numEl.textContent = formatCount(total);
                  counterEl.classList.add('view-count-final');
                } else {
                  numEl.textContent = formatCount(Math.floor(current));
                }
              }, stepTime);
            }
          })
          .catch(function() {
            counterEl.classList.remove('view-count-loading');
            counterEl.innerHTML = '<span class="num">—</span>' + label;
          });
      })();

      // Apply language preference
      function applyLang(lang) {
        document.documentElement.setAttribute('lang', lang === 'zh' ? 'zh-CN' : 'en');
        document.querySelectorAll('[data-' + lang + ']').forEach(function(el) {
          el.innerHTML = el.getAttribute('data-' + lang);
        });
        var vc = document.getElementById('view-count');
        if (vc && vc.dataset.count) {
          var label = lang === 'zh' ? ' 次阅读' : ' views';
          vc.innerHTML = '<span class="num">' + vc.dataset.count + '</span>' + label;
        }
      }
      applyLang(localStorage.getItem('lang') || 'en');

      // Reading progress bar
      var progress = document.getElementById('reading-progress');
      if (progress) {
        window.addEventListener('scroll', function() {
          var scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
          var scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
          var percent = scrollHeight > 0 ? Math.min(100, Math.max(0, (scrollTop / scrollHeight) * 100)) : 0;
          progress.style.transform = 'translate(' + (-100 + percent) + 'vw, 0)';
        }, { passive: true });
      }
    </script>
  </body>
</html>
