    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>z</text></svg>">
  </head>
  <body>
    <header>
      <nav>
        <div id="nav">
          <h1><a href="/" title="Homepage">zetazero</a></h1>
          <a href="/about">About</a>
          <a href="https://github.com/Ha1baraA11">GitHub</a>
          <button id="theme-toggle" aria-label="Toggle theme">
            <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>

        <div id="reading-progress" aria-hidden="true"></div>

    <main>
      <article>
        <h2 class="fade-in">Posts</h2>
        <ul id="posts" class="fade-in">
          <li>
            <a href="/blog/2026/05/04/building-with-github-pages/">Building a Personal Site with GitHub Pages</a>
            <time datetime="2026-05-04">04 May 2026</time>

          <li>
            <a href="/blog/2026/05/04/hello-world/">Hello World</a>
            <time datetime="2026-05-04">04 May 2026</time>

        <h2 class="fade-in">Projects</h2>
        <ul class="fade-in">
          <li><a href="https://github.com/Ha1baraA11">MedVision-RAG</a> &mdash; Medical image retrieval powered by RAG</li>
        </ul>

        <h2 class="fade-in">Interests</h2>
        <ul class="fade-in">
          <li>AI / RAG Systems</li>

          <li>Performance Engineering</li>

    </main>

    <footer>
      <a href="/about/">zetazero</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/opentype.js@0.12.0/dist/opentype.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vivus@0.4.6/dist/vivus.min.js"></script>
    <script>
      // Hero title handwriting animation
      (function() {
        const container = document.getElementById('hero-title-container');
        if (!container) return;

        opentype.load('https://fonts.gstatic.com/s/caveat/v23/WnznHAc5bAfYB2QRah7pcpNvOx-pjfJ9SII.ttf', function(err, font) {
          if (err) { console.error('Font load error:', err); container.innerHTML = '<h1 class="hero-title">zetazero</h1>'; return; }
          var text = 'zetazero';
          var fontSize = 110;
          var glyphs = font.stringToGlyphs(text);

          var totalWidth = 0;
          var glyphWidths = [];
          for (var i = 0; i < glyphs.length; i++) {
            var w = glyphs[i].advanceWidth * fontSize / font.unitsPerEm;
            glyphWidths.push(w);
            totalWidth += w;
          }

          var padding = 20;
          var svgWidth = totalWidth + padding * 2;
          var svgHeight = 140;
          var baseline = 105;

          var svgHTML = '<svg id="hero-svg" class="hero-title-svg" viewBox="0 0 ' + svgWidth + ' ' + svgHeight + '" xmlns="http://www.w3.org/2000/svg">';
          var x = padding;
          for (var i = 0; i < glyphs.length; i++) {
            var path = glyphs[i].getPath(x, baseline, fontSize);
            var d = path.toPathData({ flipY: true, decimalPlaces: 1 });
            svgHTML += '<path d="' + d + '" fill="none" stroke="#f9c412" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
            x += glyphWidths[i];
          }
          svgHTML += '</svg>';

          container.innerHTML = svgHTML;

          new Vivus('hero-svg', {
            type: 'oneByOne',
            duration: 200,
            animTimingFunction: Vivus.EASE
          });
        });
      })();

      // Theme toggle
      (function() {
        const toggle = document.getElementById('theme-toggle');
        const root = document.documentElement;
        const saved = localStorage.getItem('theme');
        if (saved) root.setAttribute('data-theme', saved);

        toggle.addEventListener('click', () => {
          const current = root.getAttribute('data-theme');
          const next = current === 'light' ? '' : 'light';
          if (next) {
            root.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
          } else {
            root.removeAttribute('data-theme');
            localStorage.removeItem('theme');
          }
        });
      })();

      // 1. Typing effect on tagline
      (function() {
        const text = "A personal blog about code, AI, and building things.";
        const el = document.getElementById('tagline');
        let i = 0;
        const cursor = document.createElement('span');
        cursor.className = 'typing-cursor';
        el.appendChild(cursor);

        function type() {
          if (i < text.length) {
            el.insertBefore(document.createTextNode(text.charAt(i)), cursor);
            i++;
            setTimeout(type, 50 + Math.random() * 40);
          }
        }
        setTimeout(type, 600);
      })();

      // 2. Fade-in on scroll (IntersectionObserver)
      (function() {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
            }
          });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
      })();

      // 3. Reading progress bar
      (function() {
        const progress = document.getElementById('reading-progress');
        if (progress) {
          window.addEventListener('scroll', () => {
            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const percent = scrollHeight > 0 ? Math.min(100, Math.max(0, (scrollTop / scrollHeight) * 100)) : 0;
            progress.style.transform = `translate(${-100 + percent}vw, 0)`;
          }, { passive: true });
        }
      })();
    </script>
  </body>
</html>
